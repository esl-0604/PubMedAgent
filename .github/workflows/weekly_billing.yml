name: Weekly billing report (GHA scope)

on:
  schedule:
    # 매주 월요일 KST 09:00 = UTC 월요일 00:00
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Send GHA weekly billing report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          BILLING_CHANNEL_ID: "C0ASZQFMV62"
          SOURCE_LABEL: "GHA 러너 (pubmed_agent · backfill)"
          INCLUDE_GCP: "false"
        run: python billing_report.py
