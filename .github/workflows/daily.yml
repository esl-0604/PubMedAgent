name: Daily PubMed check

on:
  schedule:
    # KST 10:00 = UTC 01:00
    - cron: "0 1 * * *"
  workflow_dispatch:  # 수동 실행 버튼 활성화

permissions:
  contents: write  # sent_pmids.json 커밋용

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run PubMed agent
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python pubmed_agent.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/sent_pmids.json state/usage_log.jsonl state/logic_hash.json || true
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || true
