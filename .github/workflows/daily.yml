name: Daily PubMed check

on:
  # 정기 스케줄은 GCE VM cron으로 이전 (GHA schedule drift 회피).
  # 이 워크플로우는 수동 트리거 전용(backup).
  workflow_dispatch:

permissions:
  contents: write  # sent_pmids.json 커밋용

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run PubMed agent
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python pubmed_agent.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/sent_pmids.json state/logic_hash.json || true
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || true
