# PubMed 검색 설정
# 쿼리 구조: (keywords OR ...) AND (domain_terms OR ...) [AND authors]
keywords:
  # A. 핵심
  - "robotic endoscopy"
  - "endoscopic robot"
  - "endoluminal robot"
  - "flexible endoscopic surgery"
  - "endoscopic submucosal dissection"
  - "endoscopic suturing"
  - "endoscopic traction"
  - "endoscopic full-thickness resection"
  # B. 인접 기술
  - "natural orifice transluminal endoscopic surgery"
  - "single-port robotic surgery"
  - "per-oral endoscopic myotomy"
  - "third space endoscopy"
  - "transanal endoscopic"
  # C. 보조/지능화
  - "computer-aided detection"
  - "polyp detection"
  - "haptic feedback"
  - "surgical teleoperation"
  # D. 시술 확장 (Phase A)
  - "endoscopic mucosal resection"
  - "endoscopic ultrasound"
  - "endoscopic resection"
  - "underwater EMR"
  - "cold snare polypectomy"
  - "Barrett's esophagus"

# GI(위장관) 도메인으로 결과를 국한 (쿼리 A의 AND 조건).
domain_terms:
  - "gastrointestinal"
  - "gastric"
  - "stomach"
  - "esophageal"
  - "esophagus"
  - "colorectal"
  - "colonic"
  - "colon"
  - "rectal"
  - "duodenal"
  - "small bowel"
  - "intestinal"
  # 질환·증상 (Phase A)
  - "polyp"
  - "adenoma"
  - "Barrett"
  - "achalasia"
  - "GERD"
  - "Crohn"
  - "ulcerative colitis"
  - "IBD"

# 쿼리 A에 적용하는 GI/내시경 주요 저널 (NLM ISO 약어).
